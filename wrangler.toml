name = "s-textpaste"
main = "src/index.ts"
compatibility_date = "2025-06-30"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "frontend/dist"
not_found_handling = "single-page-application"

[[d1_databases]]
binding = "DB"
database_name = "s-textpaste-db"
database_id = ""

[observability]
enabled = true

[triggers]
crons = ["0 */6 * * *"]
